# Billy — base Compose (bind-mount / updatable-without-rebuild model).
#
# See development/infrastructure/docker-compose_spec.md §1.2:
#   - images are THIN RUNTIMES (no app code baked in);
#   - app artifacts (apps/*/dist) + all config + datastore data are HOST BIND MOUNTS;
#   - a single ./.env configures everything;
#   - update = rebuild locally (`pnpm build`) + `docker compose restart <svc>`,
#     never `docker build` / no registry.
#
# Canonical invocations (never a single monolith):
#   dev  : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   prod : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first `up`: run `pnpm install && pnpm build` on the host so
# apps/{api,worker}/dist + apps/web/dist exist to bind-mount. See README.

name: billy

networks:
  # Public-facing plane (proxy + the services it routes to).
  edge:
    driver: bridge
  # Private plane — datastores + worker; never reachable from outside.
  internal:
    driver: bridge

services:
  # ── Reverse proxy — the SOLE public entry (TLS + routing) ────────────────────
  # Uses Traefik's FILE provider (deploy/traefik/dynamic.yml) — routes/services are
  # defined statically by compose DNS name, so Traefik needs NO Docker socket
  # access. This avoids the Docker-provider client/daemon API-version handshake
  # (modern Docker Engine rejects Traefik's default old client version) and removes
  # socket exposure. The prod overlay adds the :443 entrypoint + Let's Encrypt.
  proxy:
    image: traefik:v3.5
    restart: unless-stopped
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    networks: [edge]
    ports:
      - "${PROXY_HTTP_PORT:-3480}:80"
    volumes:
      - ./data/proxy:/data
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }

  # ── Web — nginx serving the locally-built SPA/PWA (no app code in image) ─────
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [edge]
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro           # locally-built SPA
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/config.js:/usr/share/nginx/html/config.js:ro  # RUNTIME config (copy from deploy/config.js.example; gitignored)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    depends_on:
      api: { condition: service_healthy }

  # ── API — REST + WS + /health + /metrics (thin node + argon2, bind-mounted dist) ─
  api:
    # Thin runtime image that bakes ONLY the native @node-rs/argon2 (the one dep
    # esbuild can't inline and a host node_modules can't portably bind-mount —
    # per-platform binary + pnpm symlink). NO app code in the image; the bundle
    # is bind-mounted below. See apps/api/Dockerfile.
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: billy-api-runtime:local
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/api/dist/index.js"]
    env_file:
      - path: ./.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/billy
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@billy.local}
    networks: [edge, internal]
    volumes:
      - ./apps/api/dist:/app/apps/api/dist:ro     # locally-built bundle (updatable)
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      # /api/* and /socket.io/* route to the api; /metrics is NOT routed (internal).
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/public`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      # The API self-provisions the files bucket on boot (ensureBucket), so it only
      # needs MinIO reachable — no init container.
      minio: { condition: service_healthy }

  # ── Worker — BullMQ consumers; node + Chromium (PDF render) ──────────────────
  worker:
    # Custom thin image: Playwright base (Chromium + fonts) with NO app code —
    # the bundle is bind-mounted. See apps/worker/Dockerfile.
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: billy-worker-runtime:local
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/worker/dist/index.js"]
    env_file:
      - path: ./.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_URI: mongodb://mongodb:27017/billy
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@billy.local}
      PDF_CONCURRENCY: ${PDF_CONCURRENCY:-2}
    networks: [internal]
    volumes:
      - ./apps/worker/dist:/app/apps/worker/dist:ro    # locally-built bundle
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  # ── Scheduler — optional dedicated repeatable-job runner (scale profile) ─────
  # By default repeatable jobs run INSIDE the worker; enable this only under load
  # (`--profile scale`). Exactly one process must register repeatable jobs.
  scheduler:
    profiles: [scale]
    image: billy-worker-runtime:local
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/worker/dist/index.js"]
    env_file:
      - path: ./.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      WORKER_ROLE: scheduler
      MONGO_URI: mongodb://mongodb:27017/billy
      REDIS_URL: redis://redis:6379
    networks: [internal]
    depends_on:
      redis: { condition: service_healthy }

  # ── Datastores (bind-mounted to ./data for inspection + backup) ──────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    networks: [internal]
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks: [internal]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-billy-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-env}
    networks: [internal]
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
  # NOTE: no `minio-init` service — the API self-provisions the `billy-files`
  # bucket (private) on boot via minio.ensureBucket(). A fresh install needs no
  # init container and no manual `mc mb`.
