# Billy web — nginx serving the locally-built Vue SPA/PWA (bind-mounted).
# Bind-mounted read-only; edit + `docker compose restart web` to apply (no rebuild).
# The proxy (Traefik) terminates TLS and forwards /api + /socket.io to the api
# service, so this server only serves static assets + the SPA fallback. If you
# run nginx as the sole entry (no Traefik), uncomment the /api + /socket.io
# proxy_pass blocks below.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Runtime config + the SPA entry must NEVER be cached — repointing config.js
    # (bind-mounted) or shipping a new index.html must take effect immediately.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # The PWA service worker must revalidate so updates roll out.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Fingerprinted static assets (vite emits hashed filenames) — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- Optional: serve /api + /socket.io directly (no Traefik) ---------------
    # location /api/       { proxy_pass http://api:3000; include /etc/nginx/proxy_common; }
    # location /socket.io/ {
    #     proxy_pass http://api:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # SPA fallback — every unmatched route serves the shell (client-side router
    # + offline PWA navigateFallback).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
